name: Build Clash rules

on:
  push:
    branches: [ main ]
    paths:
      - "rules.json"
      - "scripts/convert_rules.py"
      - ".github/workflows/build-clash-rules.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Convert JSON to Clash YAML
        run: python scripts/convert_rules.py

      - name: Commit generated file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/proxy_rules.yaml
          git diff --cached --quiet || git commit -m "chore: update generated Clash rules"
          git push